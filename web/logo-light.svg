<line x1="-58" y1="-58" x2="58" y2="58" stroke="#1D4ED8" stroke-width="2.2" opacity="0.37"/>
<line x1="-58" y1="58" x2="58" y2="-58" stroke="#1D4ED8" stroke-width="2.2" opacity="0.37"/>
