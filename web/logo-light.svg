<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="sweepIcon" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" style="stop-color:#1D4ED8;stop-opacity:0"/>
<stop offset="50%" style="stop-color:#3B82F6;stop-opacity:0.65"/>
<stop offset="80%" style="stop-color:#38BDF8;stop-opacity:0.9"/>
<stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1"/>
</linearGradient>
<linearGradient id="sweepGlowIcon" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" style="stop-color:#38BDF8;stop-opacity:0"/>
<stop offset="60%" style="stop-color:#38BDF8;stop-opacity:0.45"/>
<stop offset="100%" style="stop-color:#60A5FA;stop-opacity:0.65"/>
</linearGradient>
<radialGradient id="plateIcon">
<stop offset="0%" style="stop-color:#F0F9FF"/>
<stop offset="70%" style="stop-color:#E0F2FE"/>
<stop offset="100%" style="stop-color:#BAE6FD"/>
</radialGradient>
<radialGradient id="innerIcon">
<stop offset="0%" style="stop-color:#F8FAFC"/>
<stop offset="100%" style="stop-color:#E0F2FE"/>
</radialGradient>
<radialGradient id="coreIcon">
<stop offset="0%" style="stop-color:#FFFFFF"/>
<stop offset="40%" style="stop-color:#60A5FA"/>
<stop offset="100%" style="stop-color:#1D4ED8"/>
</radialGradient>
<radialGradient id="pulseIcon">
<stop offset="0%" style="stop-color:#38BDF8;stop-opacity:0.85"/>
<stop offset="60%" style="stop-color:#38BDF8;stop-opacity:0.35"/>
<stop offset="100%" style="stop-color:#38BDF8;stop-opacity:0"/>
</radialGradient>
<radialGradient id="coreGlowIcon">
<stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.5"/>
<stop offset="100%" style="stop-color:#60A5FA;stop-opacity:0"/>
</radialGradient>
<filter id="shadowIcon">
<feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
<feOffset dx="1.5" dy="3"/>
<feComponentTransfer>
<feFuncA type="linear" slope="0.32"/>
</feComponentTransfer>
<feMerge>
<feMergeNode/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>
<filter id="strongGlowIcon">
<feGaussianBlur stdDeviation="5"/>
</filter>
<filter id="mediumGlowIcon">
<feGaussianBlur stdDeviation="3"/>
</filter>
